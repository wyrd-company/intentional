$schema: https://refinery.systems/ontology/technical-design
relationships: {}
objective: >-
  Provide a single, fast, dependency-free CLI that manages change intents,
  version computation, manifest projection, changelogs, tags, and a verifiable
  release plan across polyglot repositories — node, Rust, Dart, .NET, Python,
  and Go — replacing per-ecosystem versioning tools and bespoke CD glue.
background:
  current-design: >-
    Changesets-style workflows are ecosystem-bound. Changesets itself is
    npm-only: packages in other ecosystems must be listed in its ignore
    configuration and handled by hand-written CD jobs (for example, cutting a
    Dart git tag after an npm publish). Repositories that need release rigor
    beyond changesets build bespoke release-contract scripts that implement
    deterministic planning and coordinate ecosystem-specific delivery per
    repository. Tag-driven calculators (MinVer, tagver) compute versions from
    git tags but cannot know whether pending work is breaking, so they guess
    the next version.
  problems:
    - No existing tool covers node, Rust, Dart, .NET, Python, and Go manifests
      as a single static binary; knope is closest but does not cover csproj or
      pubspec, covector is JavaScript, changie does not bump manifests,
      release-plz is Rust-only.
    - Ecosystem-name package identity forces polyglot packages out of the
      versioning workflow entirely (ignore lists plus CD duct tape).
    - Tag-driven and manifest-driven versioning models conflict when aimed at
      the same repository, and each has a known weakness the other repairs.
    - Release planning and tag verification logic gets rebuilt per repository
      as untested CI scripts.
design-challenges:
  version-source-of-truth: >-
    Manifest-driven ecosystems (npm, cargo, pub, msbuild, python) and
    tag-driven ecosystems (Go modules) appear to demand opposing models. The
    real invariant is narrower: every registry except Go's requires the
    version to be materialized in the artifact at publish time — none require
    it to be stored in git. The design must reconcile both without forking the
    mental model per repository.
  cross-ecosystem-identity: >-
    One logical package may ship to multiple ecosystems at one version (an npm
    and a pub build of the same runtime). Ecosystem package names cannot serve
    as identity without recreating the ignore-list problem.
  choreography-diversity: >-
    Release choreography varies legitimately per repository: local
    commit-and-push, bot-authored version PRs, and deterministic
    source-to-release commit pipelines. The tool must compose with all of them
    without owning any of them.
  format-preserving-writes: >-
    Projecting versions into manifests must not destroy comments or formatting
    in YAML, TOML, or JSON files that humans also edit.
  bump-evidence: >-
    Declared bump levels are claims. Public API surface diffs can ground those
    claims, but API scanning is ecosystem-specific and must not expand the
    tool into a polyglot static-analysis project.
  adoption-authority: >-
    A repository adopting Intentional may already contain pending release
    intent, versioning configuration, and executable integrations owned by
    another tool. Discovery must preserve that authority until the imported
    contract is complete, unambiguous, and equivalent.
  incomplete-discovery: >-
    Manifest discovery can prove package identity and version projections but
    cannot infer repository-specific choices such as ignored-package
    disposition, tag roles, or the meaning of bespoke release automation.
    Initialization needs a durable, editable handoff that records evidence and
    requests only the decisions discovery cannot prove.
  takeover-continuity: >-
    Intentional writes working-tree state but does not create commits. The
    authority handoff and the baseline tags therefore occur on opposite sides
    of an externally created commit without relying on retained terminal
    output or a permanent migration-state file.
proposed-design:
  high-level-overview: >-
    Intents answer what the next version should be; tags answer what was
    released; manifests are projections, never sources. Accumulated intent
    files determine the next bump per logical package. The tool always tags on
    release; tags are the canonical release record in every mode. Manifests
    receive the version by per-projection policy — committed, injected at
    build time, or none (Go's degenerate case). Between releases the two
    models compose: the next version from intents plus tag height from tagver
    yields deterministic ephemeral build versions with no stored state. The
    tool's boundary is git state plus a canonical, digest-bound release plan
    that CD executes; it never speaks a registry protocol, and it never
    commits, pushes, or opens pull requests.
  core-model: >-
    A workspace declares an inventory of logical packages in
    .intentional/config.yml. Each package has a path, one or more projections,
    named tags, and optional explicit depends-on edges. Exactly one package tag
    is primary and supplies current-version authority; any projection tags
    record that same logical release in additional tag namespaces. Named
    workspace tags represent repository-level release records and CD triggers
    without becoming package version authority. Tag templates never add a v
    prefix. The next version is the primary tag version plus the accumulated
    intent bump interpreted by the workspace contract. No version field exists
    in config, so hand-edited manifest versions are observable drift rather
    than competing authority. Monorepo support includes per-package intents,
    internal-dependency bumping with generated changelog entries, fixed and
    linked release groups, and changed/unchanged partitioning. Within one
    ecosystem the dependency graph is derived from manifests to assist and
    verify; the authored config remains authoritative because
    cross-ecosystem edges are invisible to manifests.
  intent-files: >-
    Intents live in .intentional/intents/ as markdown files with a YAML
    frontmatter block mapping logical package ids to bump levels; the markdown
    body is the changelog prose. Filenames are generated memorable slugs so
    parallel branches do not conflict. Intents reference logical ids, never
    ecosystem names. A logical package with npm and pub projections is one
    package with one version — cross-ecosystem linked versioning falls out of
    identity rather than being a feature.
  projections-and-adapters: >-
    Ecosystem adapters (npm, cargo, pub, msbuild, python, go) know where the
    version lives in their manifest and how to rewrite internal dependency
    ranges. Format adapters (json, yaml, toml) take a file path and pointer and
    cover arbitrary version-bearing files (for example a devcontainer feature
    manifest). All writers are format-preserving (toml_edit-class libraries).
    Ecosystem adapters are thin specializations of format adapters. The go
    adapter is tag-only, except that a major bump rewrites the module path
    suffix. Projection modes are committed (the version bump lands in a
    commit), injected (stamp materializes a build-time version), and none.
  version-computation: >-
    Ephemeral build versions compose statelessly: next version from intents,
    prerelease identifier, height from tagver — for example 1.3.0-alpha.5.
    Channel releases (beta and similar) are opt-in per invocation via
    --channel on plan, apply, and tag; the iteration number derives from
    existing tags (max existing channel tag for that version, plus one). No
    stored pre-mode state exists. Channel releases do not consume intents;
    intents survive until the final channel-less release, so every channel
    release recomputes from the full intent set. The workspace config selects
    pre-1-0-bump-mapping. Component mapping applies major, minor, and patch to
    the corresponding SemVer component. Compatibility mapping treats bump
    names as compatibility significance: major advances 0.x.y to 0.(x+1).0,
    while minor and patch advance to 0.x.(y+1). New workspaces use
    compatibility mapping; Changesets adoption recommends component mapping.
  release-groups: >-
    Fixed and linked groups contain logical package ids. When any managed
    member of a fixed group receives a direct or dependency-derived bump, all
    managed members release. The group takes the highest current member
    version, selects the highest requested bump, applies the configured
    pre-1.0 mapping once, and assigns the result to every member. A suspended
    member blocks a fixed-group release because the shared release cannot be
    completed. In a linked group, only members with direct or
    dependency-derived bumps release. Every releasing member uses the highest
    current version across the full group and the highest requested bump among
    the releasing members; unaffected members retain their versions. A
    suspended linked member blocks only when it would release. Excluded
    packages cannot appear in either group, and a package belongs to at most
    one release group. Dependency propagation and group constraints are
    evaluated to a fixed point before the release plan is sealed.
  tag-contract: >-
    Every tag is an annotated release record carrying the interpretation
    contract, generator name and version, and release-plan digest. A logical
    package has exactly one primary tag and any number of projection tags. All
    tags for one logical release target the same commit and agree on package
    version, contract, and plan digest. A projection tag can trigger external
    automation but does not become lesser evidence or an alternate version
    source. Named workspace tags carry the same record for a workspace release
    and can use a plain {version} template. Each workspace tag has its own
    version stream: its latest matching tag supplies the current version and
    the highest bump among participating packages supplies its next bump. A
    workspace tag without an existing stream requires an explicit baseline
    version. A tag can declare require-phase as before-publication or
    after-publication; creating it requires an equal --phase value. The phase
    is an executor declaration bound to the plan. Publication state and
    registry evidence belong to the external release executor.
  tag-ordering: >-
    Tags express observable prerequisites with tag-after. Before creating a
    tag, Intentional resolves every prerequisite tag expected by the plan and
    verifies its target commit, expected version, interpretation contract, and
    plan digest. Missing or conflicting prerequisites block that tag. The
    release plan contains tag order only; external CD determines how tag
    creation relates to publication and other side effects.
  initialization-discovery: >-
    Init derives its default inventory boundary from package-manager workspace
    membership and derives package identities from manifest-native names.
    Directory basenames are evidence only and never package ids, so repeated
    basenames in different subtrees do not collide. --scan-all explicitly
    broadens discovery beyond workspace membership. Discovery records every
    manifest and workspace file used as evidence, recognizes existing
    Intentional or Changesets authority, and locates executable Changesets
    references in workflows, package scripts, dependency declarations,
    lockfiles, release scripts, and tests.
  initialization-plan: |-
    Init writes canonical config only when the complete configuration is
    proven. Otherwise it writes one transient `.intentional/init-plan.yml`.
    The plan is deterministic and schema-backed. It contains the discovered
    source kind, source fingerprint, inferred configuration, diagnostics,
    evidence locations and digests, planned operations, parity result, finite
    resolution choices, recommendations, and editable resolution fields. Its
    computed state is `needs-input` or `ready`; editing the state cannot bypass
    validation. Stable diagnostic codes identify conditions, while diagnostic
    ids combine the code with the affected package, tag, or repository
    location so agents can reconcile reruns.

    YAML choices are compact scalar values with one inline comment explaining
    each value, followed by recommended and resolution fields. Dry-run emits
    the same plan without writing it. Human-readable and
    structured JSON output expose the same state, diagnostics, evidence,
    choices, and next actions. Success, needs-input, and failure are distinct
    process outcomes. On rerun, init recomputes the source fingerprint,
    preserves a resolution only while its evidence remains valid, and reports
    invalidated resolutions with their changed evidence.
  changesets-adoption: >-
    A .changeset/config.json source activates the Changesets importer. The
    importer maps package identities, pending changes, fixed and linked groups,
    internal-dependency bump policy, ignored packages, and private-package
    version behavior into the initialization plan. Changesets bump names use
    component pre-1.0 mapping. Each pending Changesets file becomes one
    Intentional intent: its markdown body is preserved and its manifest-native
    package names are mapped to logical package ids. The importer independently
    computes the source Changesets release result and the proposed Intentional
    release result, including dependency propagation and group constraints,
    then records package membership, requested bumps, and next-version parity.
    Source dependency propagation preserves npm dependency kinds, npm and
    workspace ranges, Changesets' out-of-range default, peer-major behavior,
    and its supported experimental dependent-update switches.
    Range-conditional peer updates are also surfaced as an explicit contract
    choice because canonical Intentional `depends-on` edges are uniform; a
    current release difference remains a parity blocker. Internal
    devDependencies participate in the source computation without becoming
    durable Intentional `depends-on` edges; that contract choice is explicit
    and current divergence remains blocking. Release-profile
    versionSource mappings rewrite manifest-native intent keys to the selected
    logical package identity before comparison and conversion.
    Unsupported settings and repository-specific release metadata remain
    explicit diagnostics with source evidence rather than inferred behavior.
  package-disposition: >-
    Managed packages belong to the inventory and participate in release
    computation. Suspended packages remain configured and visible to status
    and check, but any release that requires them is blocked. Excluded
    discovery candidates do not enter the inventory. Every Changesets ignore
    entry produces a suspended, excluded, or managed resolution; suspended is
    recommended because it preserves the identity and blocks release until the
    repository owner resolves its contract. Package privacy is separate from
    package disposition and does not imply exclusion or suspension.
  repository-integration-resolutions: >-
    Changesets references outside .changeset are repository integrations, not
    state owned by Intentional. The initialization plan reports each reference
    with its exact location and requires an explicit resolution describing the
    repository edit. A resolution is accepted only when a rerun inspects the
    referenced file and observes the declared outcome. An acknowledgement
    without the corresponding file change does not advance the plan to ready.
  takeover-transaction: >-
    Ordinary init leaves a Changesets repository under Changesets authority,
    including when the initialization plan is ready. Intentional init
    --take-over is the sole authority handoff. It verifies the current source
    fingerprint, every resolution, release-plan parity, and the complete
    operation set immediately before mutation. A rollback-capable filesystem
    transaction writes canonical Intentional config and converted intents,
    removes recognized .changeset state, and consumes the initialization plan
    as one all-or-nothing operation. Transient staging and rollback data are
    removed after success and are recoverable on the next init after an
    interrupted process. Takeover changes only .intentional and .changeset;
    verified repository integrations are edited by the user or agent that owns
    the repository.
  baseline-establishment: >-
    Takeover output identifies intentional tag --baseline as the post-commit
    continuation in human-readable and structured forms. Status and check
    independently rediscover the missing-baseline condition and emit the same
    stable diagnostic and command until the tags exist. Baseline creation runs
    against the externally created takeover commit. It infers a logical
    package version only when every version-bearing projection agrees and
    reports per-file evidence when they differ. A tag-only package requires an
    explicit baseline version. Baseline tags use the configured primary,
    projection, and workspace templates, are annotated with the contract and
    plan digest, target the takeover commit, and do not require a phase.
  command-surface: >-
    init discovers the inventory, writes complete configuration for an
    unambiguous new workspace, and otherwise produces or reconciles the single
    initialization plan. --scan-all broadens discovery and --take-over performs
    a validated authority handoff. add authors an intent through flags or an
    interactive prompt. status reports pending intents, computed next
    versions, drift, suspended release blockers, and missing baselines. plan
    emits the canonical release plan without mutation. apply writes projections
    and changelogs and consumes intents in the working tree. stamp writes
    computed versions into injected projections and touches nothing else. tag
    creates configured package and workspace tags, accepts --phase for tags
    with a required phase, and accepts --baseline to establish initial release
    authority. Tag is the only git-writing command. check is the CI gate for
    config, schema, intent validity, tag-record consistency, baseline presence,
    and plan determinism. Every writing verb supports --dry-run and reports the
    exact operation set. Commit, push, and forge choreography belong to the
    harness.
  release-plan: >-
    Plan emits canonical JSON listing packages, old and new versions,
    contributing intent ids, primary, projection, and workspace tags, tag-after
    prerequisites, required phase declarations, and rendered release notes per
    package. The interpretation contract and generator record are part of the
    canonical payload sealed by its digest. CD consumes the plan as release
    input and owns all publication and forge operations. The plan's only
    ordering edges are tag-after prerequisites.
  changelog-model: >-
    apply writes each affected package's CHANGELOG.md from the consumed intent
    bodies; a multi-package intent's body lands in each affected package's
    changelog, and a multi-projection package has exactly one changelog.
    Sections group by bump level (breaking, features, fixes); an optional kind
    frontmatter field can refine grouping later without schema breakage.
    Internal dependency bumps generate their own entries. Channel releases
    write a section for the channel version; the final release replaces that
    version's prerelease sections with the consolidated section. Output is
    deterministic, lintable CommonMark. Enrichment (PR links, contributors)
    would arrive as data passed into the tool, never fetched by it.
  api-approval-gate: >-
    Future scope, first increment after the core ships. The tool orchestrates
    an approval-test loop over public API surfaces but never scans a language
    itself: per-package config names a command that emits a deterministic,
    line-oriented surface (cargo public-api, api-extractor, PublicApiGenerator,
    griffe, apidiff, dart_apitool). A golden surface file is checked into git;
    api check regenerates, diffs, and on failure leaves the received file
    behind; api approve blesses it. Classification floors: additions-only
    implies at least minor, mutation or removal implies at least major, no
    change implies patch; the mapping is version-aware pre-1.0. check fails
    when a declared bump is below the floor; declaring above the floor is
    always allowed because behavioral breaks are invisible to surfaces. The
    gate is opt-in per package, and add can prefill the suggested bump from
    the current diff.
  interpretation-contract: >-
    Interpretation semantics — bump aggregation, the pre-1.0 mapping,
    canonicalization rules, changelog grouping — are versioned as a contract,
    distinct from file-shape schemas. Config declares `contract` (written by
    init); the binary carries an interpreter per contract it supports, so any
    tool version interpreting a contract-1 workspace applies contract-1
    semantics regardless of the binary's age. The release plan embeds the
    contract and a generator record (tool name and version) inside the
    digested payload, making the plan self-describing evidence of what was
    decided and under which rules. Tags are annotated, carrying a small
    canonical message: contract, tool version, and plan digest — each tag is
    thereby a complete, self-describing release record, which also gives
    releases with no registry publish (pub-by-git-tag, Go) a real evidence
    record. Intent files and changelogs stay unbranded; they are authoring
    artifacts interpreted under the workspace contract. The configured
    pre-1-0-bump-mapping is an input to that contract, so component and
    compatibility workspaces remain deterministic under every supporting tool
    version.
  release-recovery-and-verification: >-
    Because apply consumes intents before tag runs, tag re-derives the
    release rather than trusting a materialized artifact. In CD, tag accepts
    --plan with the digest-sealed plan the harness is executing. Locally, tag
    locates the release commit — the most recent commit since the last
    release tags that deletes files under .intentional/intents/ — reads the
    deleted intents from that commit's parent, and recomputes bumps and
    versions from first principles under the contract recorded in the
    previous release's tag. In both paths the recomputed result must match
    the materialized tree (projections and the leading changelog section,
    which serves as witness, not source); on mismatch, tag refuses and
    reports the divergence. Channel releases need no recovery, since channel
    applies retain intents.
  crate-layout-and-distribution: >-
    A Cargo workspace mirroring tagver: intentional-core (model, adapters,
    planning; no CLI dependencies) and intentional-cli (thin clap binary).
    Config and intent-frontmatter schemas publish under
    https://intentional.foo/schemas/. The
    tagver library crate supplies tag discovery and height math, gitoxide
    transitively. Distribution: crates.io, the wyrd-company/tools Homebrew
    tap, and a plumbing GitHub Action that runs the binary; a higher-level
    orchestration action (version-PR choreography) is future scope. MSRV and
    CI conventions follow tagver.
  out-of-scope: >-
    Registry protocols (npm, crates.io, pub.dev, NuGet, PyPI) permanently;
    committing, pushing, or opening pull requests permanently; language
    parsing and API surface scanning permanently (delegated to per-package
    commands); forge API calls for changelog enrichment; artifact digests and
    evidence binding in the first version.
