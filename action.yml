# ---
# relationships:
#   implements: intent-driven-polyglot-release
# ---
name: "intentional"
description: "Run one intentional release or versioning command"
author: "wyrd-company"
branding:
  icon: "git-commit"
  color: "orange"

inputs:
  command:
    description: "Command to run: init, check, status, plan, stamp, apply, or tag"
    required: false
    default: "check"
  channel:
    description: "Optional release channel for plan, apply, or tag"
    required: false
  prerelease:
    description: "Optional prerelease identifier for stamp"
    required: false
  phase:
    description: "Optional tag executor phase: before-publication or after-publication"
    required: false
  release-plan:
    description: "Optional digest-sealed release plan path for tag verification"
    required: false
  baseline:
    description: "Establish baseline tags when command is tag"
    required: false
    default: "false"
  baseline-versions:
    description: "Optional newline-delimited id=X.Y.Z baseline values"
    required: false
  scan-all:
    description: "Include supported manifests outside package-manager workspace membership during init"
    required: false
    default: "false"
  take-over:
    description: "Perform a validated Changesets authority handoff during init"
    required: false
    default: "false"
  json:
    description: "Emit structured JSON during init"
    required: false
    default: "false"
  dry-run:
    description: "Preview init, stamp, apply, or tag without changing the workspace"
    required: false
    default: "false"
  working-directory:
    description: "Workspace directory to process"
    required: false
    default: "."
  intentional-version:
    description: "Released intentional version without a v prefix, or latest"
    required: false
    default: "latest"

outputs:
  plan:
    description: "Canonical JSON emitted when command is plan"
    value: ${{ steps.run.outputs.plan }}
  changed:
    description: "Whether a plan contains at least one changed release unit"
    value: ${{ steps.run.outputs.changed }}

runs:
  using: "composite"
  steps:
    - name: Install intentional
      shell: bash
      env:
        REQUESTED_VERSION: ${{ inputs.intentional-version }}
      run: |
        set -euo pipefail

        if [[ "$(uname -s)" != "Linux" ]]; then
          echo "::error::The intentional action supports Linux runners."
          exit 1
        fi

        case "$(uname -m)" in
          x86_64)
            ASSET_NAME="intentional-linux-x86_64.tar.gz"
            ;;
          aarch64|arm64)
            ASSET_NAME="intentional-linux-arm64.tar.gz"
            ;;
          *)
            echo "::error::No released intentional binary for architecture $(uname -m)."
            exit 1
            ;;
        esac

        if [[ "$REQUESTED_VERSION" == "latest" ]]; then
          DOWNLOAD_URL="https://github.com/wyrd-company/intentional/releases/latest/download/$ASSET_NAME"
        elif [[ "$REQUESTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          DOWNLOAD_URL="https://github.com/wyrd-company/intentional/releases/download/$REQUESTED_VERSION/$ASSET_NAME"
        else
          echo "::error::intentional-version must be latest or a plain SemVer version."
          exit 1
        fi

        INSTALL_DIR="$RUNNER_TEMP/intentional/bin"
        ARCHIVE_DIR="$(mktemp -d)"
        ARCHIVE_PATH="$ARCHIVE_DIR/$ASSET_NAME"
        CHECKSUM_PATH="$ARCHIVE_DIR/SHA256SUMS"
        trap 'rm -rf "$ARCHIVE_DIR"' EXIT

        RELEASE_BASE="${DOWNLOAD_URL%/$ASSET_NAME}"
        curl --fail --silent --show-error --location --max-redirs 5 \
          --proto '=https' --tlsv1.2 \
          --output "$CHECKSUM_PATH" "$RELEASE_BASE/SHA256SUMS"
        curl --fail --silent --show-error --location --max-redirs 5 \
          --proto '=https' --tlsv1.2 \
          --output "$ARCHIVE_PATH" "$DOWNLOAD_URL"

        EXPECTED_CHECKSUM="$(awk -v asset="$ASSET_NAME" '$2 == asset { print $1 }' "$CHECKSUM_PATH")"
        if [[ ! "$EXPECTED_CHECKSUM" =~ ^[a-fA-F0-9]{64}$ ]] || \
           [[ "$(awk -v asset="$ASSET_NAME" '$2 == asset { count++ } END { print count + 0 }' "$CHECKSUM_PATH")" != "1" ]]; then
          echo "::error::SHA256SUMS must contain exactly one checksum for $ASSET_NAME."
          exit 1
        fi
        ACTUAL_CHECKSUM="$(sha256sum "$ARCHIVE_PATH" | cut -d' ' -f1)"
        if [[ "${ACTUAL_CHECKSUM,,}" != "${EXPECTED_CHECKSUM,,}" ]]; then
          echo "::error::Checksum verification failed for $ASSET_NAME."
          exit 1
        fi

        mkdir -p "$INSTALL_DIR"
        tar -xOzf "$ARCHIVE_PATH" "${ASSET_NAME%.tar.gz}/intentional" \
          > "$INSTALL_DIR/intentional.partial"
        test -s "$INSTALL_DIR/intentional.partial"
        mv "$INSTALL_DIR/intentional.partial" "$INSTALL_DIR/intentional"
        chmod +x "$INSTALL_DIR/intentional"
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"

    - name: Run intentional
      id: run
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_CHANNEL: ${{ inputs.channel }}
        INPUT_PRERELEASE: ${{ inputs.prerelease }}
        INPUT_PHASE: ${{ inputs.phase }}
        INPUT_RELEASE_PLAN: ${{ inputs.release-plan }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_BASELINE_VERSIONS: ${{ inputs.baseline-versions }}
        INPUT_SCAN_ALL: ${{ inputs.scan-all }}
        INPUT_TAKE_OVER: ${{ inputs.take-over }}
        INPUT_JSON: ${{ inputs.json }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        case "$INPUT_COMMAND" in
          init|check|status|plan|stamp|apply|tag) ;;
          *)
            echo "::error::command must be init, check, status, plan, stamp, apply, or tag."
            exit 1
            ;;
        esac

        for value in "$INPUT_DRY_RUN" "$INPUT_BASELINE" "$INPUT_SCAN_ALL" "$INPUT_TAKE_OVER" "$INPUT_JSON"; do
          case "$value" in
            true|false) ;;
            *)
              echo "::error::boolean inputs must be true or false."
              exit 1
              ;;
          esac
        done

        ARGS=(--directory "$INPUT_WORKING_DIRECTORY" "$INPUT_COMMAND")

        if [[ -n "$INPUT_CHANNEL" ]]; then
          case "$INPUT_COMMAND" in
            plan|apply|tag) ARGS+=(--channel "$INPUT_CHANNEL") ;;
            *)
              echo "::error::channel is only valid for plan, apply, or tag."
              exit 1
              ;;
          esac
        fi

        if [[ -n "$INPUT_PRERELEASE" ]]; then
          if [[ "$INPUT_COMMAND" != "stamp" ]]; then
            echo "::error::prerelease is only valid for stamp."
            exit 1
          fi
          ARGS+=(--prerelease "$INPUT_PRERELEASE")
        fi

        if [[ -n "$INPUT_PHASE" ]]; then
          if [[ "$INPUT_COMMAND" != "tag" ]]; then
            echo "::error::phase is only valid for tag."
            exit 1
          fi
          ARGS+=(--phase "$INPUT_PHASE")
        fi

        if [[ -n "$INPUT_RELEASE_PLAN" ]]; then
          if [[ "$INPUT_COMMAND" != "tag" ]]; then
            echo "::error::release-plan is only valid for tag."
            exit 1
          fi
          ARGS+=(--plan "$INPUT_RELEASE_PLAN")
        fi

        if [[ "$INPUT_BASELINE" == "true" ]]; then
          if [[ "$INPUT_COMMAND" != "tag" ]]; then
            echo "::error::baseline is only valid for tag."
            exit 1
          fi
          ARGS+=(--baseline)
        fi

        if [[ -n "$INPUT_BASELINE_VERSIONS" ]]; then
          if [[ "$INPUT_COMMAND" != "tag" || "$INPUT_BASELINE" != "true" ]]; then
            echo "::error::baseline-versions requires tag with baseline enabled."
            exit 1
          fi
          while IFS= read -r value; do
            [[ -n "$value" ]] && ARGS+=(--version "$value")
          done <<< "$INPUT_BASELINE_VERSIONS"
        fi

        if [[ "$INPUT_SCAN_ALL" == "true" ]]; then
          [[ "$INPUT_COMMAND" == "init" ]] || { echo "::error::scan-all is only valid for init."; exit 1; }
          ARGS+=(--scan-all)
        fi

        if [[ "$INPUT_TAKE_OVER" == "true" ]]; then
          [[ "$INPUT_COMMAND" == "init" ]] || { echo "::error::take-over is only valid for init."; exit 1; }
          ARGS+=(--take-over)
        fi

        if [[ "$INPUT_JSON" == "true" ]]; then
          [[ "$INPUT_COMMAND" == "init" ]] || { echo "::error::json is only valid for init."; exit 1; }
          ARGS+=(--json)
        fi

        if [[ "$INPUT_DRY_RUN" == "true" ]]; then
          case "$INPUT_COMMAND" in
            init|stamp|apply|tag) ARGS+=(--dry-run) ;;
            *)
              echo "::error::dry-run is only valid for init, stamp, apply, or tag."
              exit 1
              ;;
          esac
        fi

        cd "$GITHUB_WORKSPACE"
        if [[ "$INPUT_COMMAND" == "plan" ]]; then
          PLAN_OUTPUT="$(intentional "${ARGS[@]}")"
          echo "$PLAN_OUTPUT"
          echo "plan=$PLAN_OUTPUT" >> "$GITHUB_OUTPUT"
          export PLAN_OUTPUT
          CHANGED="$(python3 - <<'PY'
        import json
        import os

        plan = json.loads(os.environ["PLAN_OUTPUT"])
        print("true" if plan.get("release_units") else "false")
        PY
          )"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
        else
          intentional "${ARGS[@]}"
          echo "plan=" >> "$GITHUB_OUTPUT"
          echo "changed=false" >> "$GITHUB_OUTPUT"
        fi
