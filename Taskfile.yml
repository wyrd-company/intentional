# ---
# relationships:
#   implements: intent-driven-polyglot-release
# ---
version: "3"

tasks:
  build:
    desc: Build the complete Rust workspace
    cmds:
      - cargo build --workspace

  test:
    desc: Run all workspace tests
    cmds:
      - cargo test --workspace

  self-check:
    desc: Verify Intentional can load its own release configuration
    cmds:
      - cargo run --quiet -p intentional-cli -- status

  lint:
    desc: Run Clippy with warnings denied
    cmds:
      - cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    desc: Format all Rust code
    cmds:
      - cargo fmt --all

  fmt-check:
    desc: Verify Rust formatting
    cmds:
      - cargo fmt --all -- --check

  ci:
    desc: Run all continuous-integration checks locally
    deps: [ docs:check, fmt-check, lint, npm:test, release:check, self-check, test ]

  npm:test:
    desc: Test the public npm launcher and its exact package contents
    cmds:
      - npm test --prefix npm

  release:check:
    desc: Validate release automation and cross-channel version agreement
    cmds:
      - actionlint .github/workflows/*.yml
      - shellcheck scripts/release/*.sh
      - ryl check .github/workflows/*.yml Taskfile.yml .intentional/config.yml
      - python3 scripts/release/verify-versions.py
      - >-
        yq -e
        '[.release-units.intentional.projections[] |
        select(.adapter == "npm" and .file == "npm/package.json" and .mode == "committed")] |
        length == 1'
        .intentional/config.yml >/dev/null
      - scripts/release/test-retry.sh

  docs:demo:
    desc: Regenerate and optimize the public documentation demo
    deps: [ build ]
    cmds:
      - vhs docs/demo.tape
      - gifsicle --batch --optimize=3 --colors 256 docs/assets/demo.gif

  docs:check:
    desc: Validate public documentation and its generated demo
    cmds:
      - bash scripts/check-docs.sh
