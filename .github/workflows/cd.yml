# ---
# relationships:
#   implements: intent-driven-polyglot-release
# ---
name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: intentional-linux-x86_64
            bin_path: target/x86_64-unknown-linux-gnu/release/intentional
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: intentional-linux-arm64
            bin_path: target/aarch64-unknown-linux-gnu/release/intentional
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: intentional-macos-arm64
            bin_path: target/aarch64-apple-darwin/release/intentional
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: intentional-windows-x86_64
            bin_path: target/x86_64-pc-windows-msvc/release/intentional.exe
            archive_ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard tag and workspace version agreement
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            echo "Release workflow must run against a SemVer tag." >&2
            exit 1
          fi

          TAG="${GITHUB_REF##*/}"
          MANIFEST_VERSION="$(python - <<'PY'
          import pathlib
          import tomllib

          manifest = tomllib.loads(pathlib.Path("Cargo.toml").read_text())
          print(manifest["workspace"]["package"]["version"])
          PY
          )"

          if [[ "$TAG" != "$MANIFEST_VERSION" ]]; then
            echo "Release tag $TAG does not match Cargo.toml workspace version $MANIFEST_VERSION." >&2
            exit 1
          fi

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/install-action@cross

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Regenerate lockfile for committed version
        run: cargo generate-lockfile

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (release)
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            cross build --workspace --release --locked --target ${{ matrix.target }}
          else
            cargo build --workspace --release --locked --target ${{ matrix.target }}
          fi

      - name: Test (Linux only)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --workspace --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          artifact="${{ matrix.artifact_name }}"
          mkdir -p dist/"${artifact}"
          cp "${{ matrix.bin_path }}" dist/"${artifact}"/
          cp LICENSE README.md dist/"${artifact}"/
          tar -C dist -czf "${artifact}.tar.gz" "${artifact}"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Force -Path "dist/$artifact" | Out-Null
          Copy-Item -Path "${{ matrix.bin_path }}" -Destination "dist/$artifact/"
          Copy-Item -Path "LICENSE","README.md" -Destination "dist/$artifact/"
          Compress-Archive -Path "dist/$artifact/*" -DestinationPath "$artifact.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            *.${{ matrix.archive_ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} + > SHA256SUMS

      - name: Extract leading changelog section
        id: notes
        shell: bash
        run: |
          if [[ ! -f CHANGELOG.md ]]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          awk '
            /^## / {
              if (found) exit
              found = 1
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [[ -s release-notes.md ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release with changelog notes
        if: steps.notes.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release with generated notes
        if: steps.notes.outputs.found != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Regenerate lockfile for committed version
        run: cargo generate-lockfile

      - name: Cargo publish dry-run (core)
        run: cargo publish -p intentional-core --locked --dry-run

      - name: Publish core
        run: cargo publish -p intentional-core --locked

      - name: Wait for crate index to update
        run: sleep 20

      - name: Cargo publish dry-run (cli)
        run: cargo publish -p intentional-cli --locked --dry-run

      - name: Publish cli
        run: cargo publish -p intentional-cli --locked

  update-major-tag:
    name: Update Major Version Tag
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Major Tag
        shell: bash
        run: |
          TAG=${GITHUB_REF##*/}
          MAJOR=${TAG%%.*}

          # Don't float a major tag pre-1.0: every 0.x bump may be breaking,
          # so consumers should pin to specific versions until 1.0.0.
          if [[ "$MAJOR" == "0" ]]; then
            echo "Skipping major tag update for pre-1.0 release ($TAG)."
            exit 0
          fi

          echo "Updating $MAJOR to point to $TAG"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -fa "$MAJOR" -m "Update $MAJOR to $TAG"
          git push origin "$MAJOR" --force

  publish-homebrew-tap:
    name: Publish Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF##*/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: wyrd-company/homebrew-tools
          path: homebrew-tools
          ssh-key: ${{ secrets.FORMULAE_PUBLISH_KEY }}

      - name: Generate formula
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          LINUX_X86_64_ARCHIVE="artifacts/intentional-linux-x86_64/intentional-linux-x86_64.tar.gz"
          LINUX_ARM64_ARCHIVE="artifacts/intentional-linux-arm64/intentional-linux-arm64.tar.gz"
          MACOS_ARM64_ARCHIVE="artifacts/intentional-macos-arm64/intentional-macos-arm64.tar.gz"

          for archive in "$LINUX_X86_64_ARCHIVE" "$LINUX_ARM64_ARCHIVE" "$MACOS_ARM64_ARCHIVE"; do
            if [[ ! -f "$archive" ]]; then
              echo "Missing expected release artifact: $archive" >&2
              exit 1
            fi
          done

          LINUX_X86_64_SHA256="$(sha256sum "$LINUX_X86_64_ARCHIVE" | cut -d' ' -f1)"
          LINUX_ARM64_SHA256="$(sha256sum "$LINUX_ARM64_ARCHIVE" | cut -d' ' -f1)"
          MACOS_ARM64_SHA256="$(sha256sum "$MACOS_ARM64_ARCHIVE" | cut -d' ' -f1)"

          cat > homebrew-tools/Formula/intentional.rb <<EOF
            class Intentional < Formula
              desc "Intent-driven polyglot release and versioning tool"
              homepage "https://github.com/${REPOSITORY}"
              license "Apache-2.0"
              version "${VERSION}"

              on_macos do
                on_arm do
                  url "https://github.com/${REPOSITORY}/releases/download/${TAG}/intentional-macos-arm64.tar.gz"
                  sha256 "${MACOS_ARM64_SHA256}"
                end
              end

              on_linux do
                on_arm do
                  url "https://github.com/${REPOSITORY}/releases/download/${TAG}/intentional-linux-arm64.tar.gz"
                  sha256 "${LINUX_ARM64_SHA256}"
                end

                on_intel do
                  url "https://github.com/${REPOSITORY}/releases/download/${TAG}/intentional-linux-x86_64.tar.gz"
                  sha256 "${LINUX_X86_64_SHA256}"
                end
              end

              def install
                bin.install "intentional"
                prefix.install_metafiles
              end

              test do
                assert_match "Intent-driven", shell_output("#{bin}/intentional --help")
              end
            end
          EOF

      - name: Commit and push formula
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd homebrew-tools

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/intentional.rb

          # --cached so a newly-added (previously untracked) formula is
          # detected; plain `git diff` only inspects tracked files.
          if git diff --cached --quiet -- Formula/intentional.rb; then
            echo "Formula already up to date."
            exit 0
          fi

          git commit -m "intentional ${VERSION}"
          git push origin HEAD
