# ---
# relationships:
#   implements: intent-driven-polyglot-release
# ---
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  minimum-rust:
    name: Minimum supported Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - name: Test the locked workspace with Rust 1.85
        run: cargo test --workspace --locked

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Check this repository with intentional
        run: cargo run --bin intentional -- check

  npm-launcher:
    name: npm launcher (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, ubuntu-24.04-arm, macos-14, windows-latest ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: false
      - name: Test launcher, installer, and package allowlist
        run: npm test --prefix npm

  release-automation:
    name: Release automation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate script syntax and version agreement
        shell: bash
        run: |
          bash -n scripts/release/*.sh
          python3 scripts/release/verify-versions.py
      - name: Exercise matching, conflicting, and retry paths
        run: scripts/release/test-retry.sh
