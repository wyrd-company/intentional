$schema: https://intentional.foo/schemas/config.yml
contract: contract-1
settings:
  internal-dependency-bump: patch
  pre-1-0-bump-mapping: compatibility
release-units:
  intentional:
    path: .
    projections:
      - adapter: toml
        file: Cargo.toml
        pointer: /workspace/package/version
        mode: committed
      - adapter: toml
        file: crates/cli/Cargo.toml
        pointer: /dependencies/intentional-core/version
        mode: committed
      - adapter: npm
        file: npm/package.json
        mode: committed
    tags:
      primary:
        role: primary
        template: "{version}"
