$schema: https://intentional.foo/schemas/config.yml
settings:
  global-tag: false
  internal-dependency-bump: patch
packages:
  intentional:
    path: .
    projections:
    - adapter: toml
      file: Cargo.toml
      pointer: /workspace/package/version
      mode: committed
    - adapter: toml
      file: crates/cli/Cargo.toml
      pointer: /dependencies/intentional-core/version
      mode: committed
    tag: '{version}'
