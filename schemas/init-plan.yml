# ---
# relationships:
#   implements: intent-driven-polyglot-release
# ---
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://intentional.foo/schemas/init-plan.yml
title: Intentional initialization plan
type: object
additionalProperties: false
required:
  - $schema
  - state
  - source-kind
  - source-fingerprint
  - inferred-config
  - discovery-candidates
  - diagnostics
  - converted-intents
  - parity
  - planned-operations
  - post-commit-action
properties:
  $schema:
    const: https://intentional.foo/schemas/init-plan.yml
  state:
    enum: [ needs-input, ready ]
  source-kind:
    const: changesets
  source-fingerprint:
    type: string
    pattern: "^sha256:[0-9a-f]{64}$"
  inferred-config:
    $ref: config.yml
  discovery-candidates:
    type: array
    items:
      $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/discovery-candidate"
  diagnostics:
    type: array
    items:
      $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/diagnostic"
  converted-intents:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [ id, release-units, message, source, target ]
      properties:
        id: { type: string }
        release-units:
          type: object
          additionalProperties:
            enum: [ major, minor, patch ]
        message: { type: string }
        source: { type: string }
        target: { type: string }
  parity:
    type: object
    additionalProperties: false
    required: [ status, release-units ]
    properties:
      status:
        enum: [ equivalent, blocked ]
      release-units:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [ release-unit, current-version ]
          properties:
            release-unit: { type: string }
            current-version: { type: string }
            source:
              $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/parity-release"
            proposed:
              $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/parity-release"
  planned-operations:
    type: array
    items: { type: string }
  post-commit-action:
    const: intentional tag --baseline
$defs:
  detector-id:
    type: string
    pattern: "^[a-z0-9][a-z0-9._-]*$"
  release-unit-id:
    type: string
    pattern: "^[A-Za-z0-9@/_.-]+$"
  exact-path:
    type: string
    minLength: 1
    not: { const: "." }
    pattern: '^(?!/)(?!.*(?:^|/)\.{1,2}(?:/|$))(?!.*//)(?!.*[*?\[\]{}])[^/]+(?:/[^/]+)*$'
  discovery-candidate:
    type: object
    additionalProperties: false
    required: [ id, detector, path, evidence ]
    properties:
      id:
        type: string
        pattern: "^candidate:[0-9a-f]{64}$"
      detector:
        $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/detector-id"
      path:
        $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/exact-path"
      evidence:
        type: array
        minItems: 1
        items:
          $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/evidence"
      native-identity:
        type: string
        minLength: 1
      raw-version:
        type: object
        additionalProperties: false
        required: [ value, evidence ]
        properties:
          value:
            type: string
            minLength: 1
          evidence:
            type: array
            minItems: 1
            items:
              $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/evidence"
      projection:
        type: object
        additionalProperties: false
        required: [ adapter, path, mode ]
        properties:
          adapter:
            enum: [ npm, cargo, pub, python, msbuild, go, json, toml, yaml ]
          path:
            $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/exact-path"
          mode:
            enum: [ committed, injected, none ]
          pointer:
            type: string
            minLength: 1
        allOf:
          - if:
              properties:
                adapter:
                  enum: [ json, toml, yaml ]
            then:
              required: [ pointer ]
      tag:
        type: object
        additionalProperties: false
        required: [ id, role, template ]
        properties:
          id:
            type: string
            pattern: "^[A-Za-z0-9][A-Za-z0-9._-]*$"
          role:
            enum: [ primary, projection ]
          template:
            type: string
            pattern: "\\{version\\}"
      diagnostics:
        type: array
        items:
          $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/extraction-diagnostic"
      resolution:
        $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/candidate-resolution"
  candidate-resolution:
    oneOf:
      - type: object
        additionalProperties: false
        required: [ kind, release-unit ]
        properties:
          kind: { const: independent }
          release-unit:
            $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/release-unit-id"
      - type: object
        additionalProperties: false
        required: [ kind, release-unit ]
        properties:
          kind: { const: projection }
          release-unit:
            $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/release-unit-id"
          target-candidate:
            type: string
            pattern: "^candidate:[0-9a-f]{64}$"
      - type: object
        additionalProperties: false
        required: [ kind ]
        properties:
          kind: { const: excluded }
  extraction-diagnostic:
    type: object
    additionalProperties: false
    required: [ id, code, message, evidence ]
    properties:
      id: { type: string, minLength: 1 }
      code: { type: string, minLength: 1 }
      message: { type: string, minLength: 1 }
      evidence:
        type: array
        minItems: 1
        items:
          $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/evidence"
  parity-release:
    type: object
    additionalProperties: false
    required: [ requested-bump, next-version ]
    properties:
      requested-bump: { enum: [ major, minor, patch ] }
      next-version: { type: string }
  evidence:
    type: object
    additionalProperties: false
    required: [ path, digest ]
    properties:
      path:
        $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/exact-path"
      digest:
        type: string
        pattern: "^sha256:[0-9a-f]{64}$"
      lines:
        type: array
        uniqueItems: true
        items:
          type: integer
          minimum: 1
  diagnostic:
    type: object
    additionalProperties: false
    required: [ id, code, message, evidence, verified ]
    properties:
      id: { type: string }
      code: { type: string }
      message: { type: string }
      evidence:
        type: array
        items:
          $ref: "https://intentional.foo/schemas/init-plan.yml#/$defs/evidence"
      choices:
        type: array
        items: { type: string }
      recommended: { type: string }
      resolution:
        type: [ string, "null" ]
      verified: { type: boolean }
      invalidated-resolution: { type: boolean }
